<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lil Traumatized</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="landing-page">

  <header class="landing-header">
    <h1 class="site-title">Lil Traumatized</h1>
    <p class="site-tagline">Photography Portfolio</p>
  </header>

  <section class="buckets">
    <!-- Bucket 1: Portraits — fully wired -->
    <a href="film.html" class="bucket" id="bucket-portraits">
      <div class="film-packet">
        <div class="film-strip">
          <div class="film-frame"><img src="Category%201%20-%20Examples/AIV00797.avif" alt="" loading="lazy" /></div>
          <div class="film-frame"><img src="Category%201%20-%20Examples/AIV01563.avif" alt="" loading="lazy" /></div>
          <div class="film-frame"><img src="Category%201%20-%20Examples/AIV01776.avif" alt="" loading="lazy" /></div>
        </div>
        <div class="film-strip">
          <div class="film-frame"><img src="Category%201%20-%20Examples/AIV00930.avif" alt="" loading="lazy" /></div>
          <div class="film-frame"><img src="Category%201%20-%20Examples/AIV01110.avif" alt="" loading="lazy" /></div>
          <div class="film-frame"><img src="Category%201%20-%20Examples/AIV01392.avif" alt="" loading="lazy" /></div>
        </div>
      </div>
      <h2 class="bucket-title">Photos I want to shoot more of</h2>
    </a>

    <!-- Bucket 2: Other work — placeholder -->
    <div class="bucket bucket--placeholder" id="bucket-work">
      <div class="film-packet">
        <div class="film-strip">
          <div class="film-frame"><img src="Category%202%20-%20General%20photos/AIV05934.avif" alt="" loading="lazy" /></div>
          <div class="film-frame"><img src="Category%202%20-%20General%20photos/AIV06003.avif" alt="" loading="lazy" /></div>
          <div class="film-frame"><img src="Category%202%20-%20General%20photos/AIV06201.avif" alt="" loading="lazy" /></div>
        </div>
        <div class="film-strip">
          <div class="film-frame"><img src="Category%202%20-%20General%20photos/AIV05957.avif" alt="" loading="lazy" /></div>
          <div class="film-frame"><img src="Category%202%20-%20General%20photos/AIV07119.avif" alt="" loading="lazy" /></div>
          <div class="film-frame"><img src="Category%202%20-%20General%20photos/AIV08294.avif" alt="" loading="lazy" /></div>
        </div>
      </div>
      <h2 class="bucket-title">My other work</h2>
      <span class="badge">Coming soon</span>
    </div>

    <!-- Bucket 3: Work I admire — placeholder -->
    <div class="bucket bucket--placeholder" id="bucket-admire">
      <div class="bucket-placeholder-visual">
        <div class="crt-shell">
          <div class="crt-screen"></div>
          <div class="crt-base"></div>
        </div>
      </div>
      <h2 class="bucket-title">Work I admire</h2>
      <span class="badge">Coming soon</span>
    </div>
  </section>

  <footer class="landing-footer">
    <a href="mailto:photoshoot@liltraumatized.com" class="contact-link">photoshoot@liltraumatized.com</a>
    <p class="copyright">&copy; 2025 Lil Traumatized Photography</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/gsap.min.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('contextmenu', function (e) {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });
  </script>
</body>
</html>
